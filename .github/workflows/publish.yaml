name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Publish Job
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
            node-version: 20
            registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: npm publish --provenance --access public